<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MuEvent Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-body">
    <span class="login-bg login-bg--one" aria-hidden="true"></span>
    <span class="login-bg login-bg--two" aria-hidden="true"></span>

    <main class="login-stage">
        <section class="login-device" aria-label="MuEvent login form">
            <div class="login-logo">
                <img src="assets/muevent-logo.svg" alt="MuEvent Your Event Guide" loading="lazy" />
            </div>

            <form class="login-form" action="#" method="post">
                <div class="login-field-line">
                    <label class="sr-only" for="loginEmail">Email</label>
                    <input id="loginEmail" name="email" type="email" value="biancahobbs@gmail.com" autocomplete="username" required />
                </div>
                <div class="login-field-line">
                    <label class="sr-only" for="loginPassword">Password</label>
                    <input id="loginPassword" name="password" type="password" value="password" autocomplete="current-password" required />
                    <button type="button" aria-label="Show password">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
                <button type="submit" class="login-cta">Login</button>
            </form>

            <a class="forgot-link" href="#">Forgot Password</a>

            <button type="button" class="faceid-cta">
                <span class="faceid-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <rect x="3" y="3" width="18" height="18" rx="4" stroke="currentColor" stroke-width="1.4" />
                        <path d="M8 9h.01M16 9h.01" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
                        <path d="M9 15c1.2 1.6 4.8 1.6 6 0" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </span>
                Login with Face ID
            </button>

            <p class="signup-line">Don't have an account? <a href="#">Create an account.</a></p>
            <small>© 2024 MuEvent</small>
        </section>
    </main>
</body>
</html>
